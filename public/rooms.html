<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WidBid - الغرف</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial; background: #0d0d1a; color: white; min-height: 100vh; }
    .navbar { background: #16213e; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1a2a4a; }
    .navbar h1 { color: #c9a84c; font-size: 24px; letter-spacing: 3px; }
    .navbar .user { display: flex; align-items: center; gap: 15px; }
    .navbar .username { color: #aaa; font-size: 14px; }
    .btn-logout { padding: 7px 15px; background: transparent; color: #e94560; border: 1px solid #e94560; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .btn-logout:hover { background: #e94560; color: white; }
    .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .header h2 { color: #c9a84c; font-size: 20px; }
    .btn-create { padding: 10px 20px; background: #c9a84c; color: #0d0d1a; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; }
    .btn-create:hover { background: #e0bc5e; }
    .rooms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
    .room-card { background: #16213e; border: 1px solid #1a2a4a; border-radius: 12px; padding: 20px; cursor: pointer; transition: 0.3s; }
    .room-card:hover { border-color: #c9a84c; transform: translateY(-2px); }
    .room-name { font-size: 16px; font-weight: bold; margin-bottom: 8px; }
    .room-info { color: #888; font-size: 13px; display: flex; gap: 15px; }
    .room-type { padding: 3px 10px; border-radius: 20px; font-size: 11px; margin-top: 10px; display: inline-block; }
    .public { background: #1a3a2a; color: #4caf82; }
    .private { background: #3a1a1a; color: #e94560; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 100; }
    .modal.show { display: flex; }
    .modal-card { background: #16213e; border-radius: 12px; padding: 30px; width: 380px; border: 1px solid #1a2a4a; }
    .modal-card h3 { color: #c9a84c; margin-bottom: 20px; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 7px; color: #aaa; font-size: 13px; }
    .form-group input, .form-group select { width: 100%; padding: 10px; background: #0d0d1a; border: 1px solid #1a2a4a; border-radius: 8px; color: white; font-size: 14px; outline: none; }
    .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
    .btn-confirm { flex: 1; padding: 11px; background: #c9a84c; color: #0d0d1a; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .btn-cancel { flex: 1; padding: 11px; background: transparent; color: #aaa; border: 1px solid #1a2a4a; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="navbar">
    <h1>WidBid</h1>
    <div class="user">
      <span class="username" id="usernameDisplay"></span>
      <button class="btn-logout" onclick="logout()">خروج</button>
    </div>
  </div>

  <div class="container">
    <div class="header">
      <h2>الغرف المتاحة</h2>
      <button class="btn-create" onclick="showModal()">+ إنشاء غرفة</button>
    </div>
    <div class="rooms-grid" id="roomsGrid"></div>
  </div>

  <div class="modal" id="createModal">
    <div class="modal-card">
      <h3>إنشاء غرفة جديدة</h3>
      <div class="form-group">
        <label>اسم الغرفة</label>
        <input type="text" id="roomName" placeholder="اسم الغرفة" />
      </div>
      <div class="form-group">
        <label>النوع</label>
        <select id="roomType">
          <option value="public">عامة</option>
          <option value="private">خاصة</option>
        </select>
      </div>
      <div class="modal-btns">
        <button class="btn-confirm" onclick="createRoom()">إنشاء</button>
        <button class="btn-cancel" onclick="hideModal()">إلغاء</button>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    const username = localStorage.getItem('username');

    if (!token) window.location.href = '/';

    document.getElementById('usernameDisplay').textContent = username;

    async function loadRooms() {
      const res = await fetch('/api/rooms');
      const data = await res.json();
      const grid = document.getElementById('roomsGrid');
      grid.innerHTML = '';
      data.rooms.forEach(room => {
        const card = document.createElement('div');
        card.className = 'room-card';
        card.innerHTML = `
          <div class="room-name">${room.name}</div>
          <div class="room-info">
            <span>👥 ${room.member_count} عضو</span>
          </div>
          <span class="room-type ${room.type}">${room.type === 'public' ? 'عامة' : 'خاصة'}</span>
        `;
        card.onclick = () => {
          localStorage.setItem('room_id', room.id);
          localStorage.setItem('room_name', room.name);
          window.location.href = '/chat.html';
        };
        grid.appendChild(card);
      });
    }

    async function createRoom() {
      const name = document.getElementById('roomName').value;
      const type = document.getElementById('roomType').value;
      const res = await fetch('/api/rooms/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'authorization': token },
        body: JSON.stringify({ name, type, owner_id: 1 })
      });
      const data = await res.json();
      if (data.success) {
        hideModal();
        loadRooms();
      }
    }

    function showModal() { document.getElementById('createModal').classList.add('show'); }
    function hideModal() { document.getElementById('createModal').classList.remove('show'); }
    function logout() { localStorage.clear(); window.location.href = '/'; }

    loadRooms();
  </script>
</body>
</html>
