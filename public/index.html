<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WidBid</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial; background: #0d0d1a; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { width: 100%; max-width: 420px; padding: 20px; }
    .logo { text-align: center; margin-bottom: 30px; }
    .logo h1 { font-size: 42px; color: #c9a84c; letter-spacing: 4px; }
    .logo p { color: #888; font-size: 13px; margin-top: 5px; }
    .card { background: #16213e; border-radius: 12px; padding: 30px; border: 1px solid #1a2a4a; }
    .tabs { display: flex; margin-bottom: 25px; border-bottom: 1px solid #1a2a4a; }
    .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; color: #888; font-size: 15px; transition: 0.3s; }
    .tab.active { color: #c9a84c; border-bottom: 2px solid #c9a84c; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; margin-bottom: 7px; color: #aaa; font-size: 13px; }
    .form-group input { width: 100%; padding: 12px; background: #0d0d1a; border: 1px solid #1a2a4a; border-radius: 8px; color: white; font-size: 14px; outline: none; transition: 0.3s; }
    .form-group input:focus { border-color: #c9a84c; }
    .btn { width: 100%; padding: 13px; background: #c9a84c; color: #0d0d1a; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .btn:hover { background: #e0bc5e; }
    .error { color: #e94560; font-size: 13px; margin-top: 10px; text-align: center; display: none; }
    .page { display: none; }
    .page.active { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>WidBid</h1>
      <p>منصة الدردشة العربية</p>
    </div>
    <div class="card">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('login')">تسجيل الدخول</div>
        <div class="tab" onclick="switchTab('register')">حساب جديد</div>
      </div>

      <div id="loginPage" class="page active">
        <div class="form-group">
          <label>البريد الإلكتروني</label>
          <input type="email" id="loginEmail" placeholder="example@email.com" />
        </div>
        <div class="form-group">
          <label>كلمة المرور</label>
          <input type="password" id="loginPassword" placeholder="••••••••" />
        </div>
        <button class="btn" onclick="login()">دخول</button>
        <div class="error" id="loginError"></div>
      </div>

      <div id="registerPage" class="page">
        <div class="form-group">
          <label>اسم المستخدم</label>
          <input type="text" id="regUsername" placeholder="اسمك في المنصة" />
        </div>
        <div class="form-group">
          <label>البريد الإلكتروني</label>
          <input type="email" id="regEmail" placeholder="example@email.com" />
        </div>
        <div class="form-group">
          <label>كلمة المرور</label>
          <input type="password" id="regPassword" placeholder="••••••••" />
        </div>
        <button class="btn" onclick="register()">إنشاء حساب</button>
        <div class="error" id="registerError"></div>
      </div>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      if (tab === 'login') {
        document.querySelectorAll('.tab')[0].classList.add('active');
        document.getElementById('loginPage').classList.add('active');
      } else {
        document.querySelectorAll('.tab')[1].classList.add('active');
        document.getElementById('registerPage').classList.add('active');
      }
    }

    async function login() {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (data.success) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('username', data.username);
        window.location.href = '/rooms.html';
      } else {
        const err = document.getElementById('loginError');
        err.textContent = data.message;
        err.style.display = 'block';
      }
    }

    async function register() {
      const username = document.getElementById('regUsername').value;
      const email = document.getElementById('regEmail').value;
      const password = document.getElementById('regPassword').value;
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password })
      });
      const data = await res.json();
      if (data.success) {
        switchTab('login');
        document.getElementById('loginError').style.display = 'none';
        alert('تم إنشاء الحساب! سجل دخولك الآن.');
      } else {
        const err = document.getElementById('registerError');
        err.textContent = data.message;
        err.style.display = 'block';
      }
    }
  </script>
</body>
</html>
