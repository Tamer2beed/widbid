<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>WidBid Chat Test</title>
  <style>
    body { font-family: Arial; background: #1a1a2e; color: white; padding: 20px; display: flex; gap: 20px; }
    #chatBox { flex: 1; }
    #sidebar { width: 200px; background: #16213e; padding: 10px; border-radius: 8px; }
    #messages { height: 400px; overflow-y: auto; background: #16213e; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
    input { padding: 8px; width: 70%; background: #0f3460; color: white; border: none; border-radius: 4px; }
    button { padding: 8px 16px; background: #e94560; color: white; border: none; border-radius: 4px; cursor: pointer; }
    .msg { margin: 5px 0; padding: 5px; background: #0f3460; border-radius: 4px; }
    .system { color: #aaa; font-style: italic; }
    h3 { color: #e94560; margin-top: 0; }
    #userList { list-style: none; padding: 0; }
    #userList li { padding: 5px; border-bottom: 1px solid #0f3460; }
  </style>
</head>
<body>
  <div id="chatBox">
    <h2>WidBid - غرفة المبتدئين</h2>
    <div id="messages"></div>
    <input id="msgInput" placeholder="اكتب رسالة..." />
    <button onclick="sendMessage()">إرسال</button>
  </div>
  <div id="sidebar">
    <h3>المتصلون</h3>
    <ul id="userList"></ul>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const username = 'tamer';
    const room_id = 1;
    const user_id = 1;

    socket.emit('joinRoom', { room_id, username });

    socket.on('messageHistory', (messages) => {
      messages.forEach(msg => addMessage(msg.username, msg.content, false));
    });

    socket.on('newMessage', (data) => {
      addMessage(data.username, data.message, false);
    });

    socket.on('userJoined', (data) => {
      addSystem(data.username + ' انضم للغرفة');
    });

    socket.on('userLeft', (data) => {
      addSystem(data.username + ' غادر الغرفة');
    });

    socket.on('onlineUsers', (users) => {
      const list = document.getElementById('userList');
      list.innerHTML = '';
      users.forEach(u => {
        const li = document.createElement('li');
        li.textContent = u;
        list.appendChild(li);
      });
    });

    function addMessage(username, message, isMe) {
      const div = document.createElement('div');
      div.className = 'msg';
      div.innerHTML = '<b>' + username + ':</b> ' + message;
      document.getElementById('messages').appendChild(div);
      document.getElementById('messages').scrollTop = 999999;
    }

    function addSystem(text) {
      const div = document.createElement('div');
      div.className = 'msg system';
      div.textContent = text;
      document.getElementById('messages').appendChild(div);
    }

    function sendMessage() {
      const message = document.getElementById('msgInput').value;
      if (message.trim()) {
        socket.emit('sendMessage', { room_id, user_id, username, message });
        document.getElementById('msgInput').value = '';
      }
    }

    document.getElementById('msgInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
