<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WidBid - دردشة</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial; background: #0d0d1a; color: white; height: 100vh; display: flex; flex-direction: column; }
    .navbar { background: #16213e; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1a2a4a; }
    .navbar .right { display: flex; align-items: center; gap: 12px; }
    .btn-back { padding: 6px 14px; background: transparent; color: #c9a84c; border: 1px solid #c9a84c; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .room-title { color: #c9a84c; font-size: 16px; font-weight: bold; }
    .username-badge { color: #aaa; font-size: 13px; }
    .main { display: flex; flex: 1; overflow: hidden; }
    .chat-area { flex: 1; display: flex; flex-direction: column; }
    #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
    .msg { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
    .msg.mine { background: #c9a84c; color: #0d0d1a; align-self: flex-end; border-bottom-right-radius: 3px; }
    .msg.other { background: #16213e; color: white; align-self: flex-start; border-bottom-left-radius: 3px; border: 1px solid #1a2a4a; }
    .msg.system { background: transparent; color: #555; font-size: 12px; align-self: center; font-style: italic; }
    .msg-username { font-size: 11px; color: #c9a84c; margin-bottom: 4px; font-weight: bold; }
    .input-area { padding: 15px; background: #16213e; border-top: 1px solid #1a2a4a; display: flex; gap: 10px; }
    .input-area input { flex: 1; padding: 11px 15px; background: #0d0d1a; border: 1px solid #1a2a4a; border-radius: 25px; color: white; font-size: 14px; outline: none; }
    .input-area input:focus { border-color: #c9a84c; }
    .btn-send { padding: 11px 22px; background: #c9a84c; color: #0d0d1a; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 14px; }
    .btn-send:hover { background: #e0bc5e; }
    .sidebar { width: 200px; background: #16213e; border-right: 1px solid #1a2a4a; padding: 15px; overflow-y: auto; }
    .sidebar h3 { color: #c9a84c; font-size: 13px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #1a2a4a; }
    #userList { list-style: none; }
    #userList li { padding: 7px 5px; font-size: 13px; color: #aaa; border-bottom: 1px solid #1a2a4a; display: flex; align-items: center; gap: 7px; }
    #userList li::before { content: '●'; color: #4caf82; font-size: 10px; }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="right">
      <button class="btn-back" onclick="window.location.href='/rooms.html'">الغرف</button>
      <span class="room-title" id="roomTitle"></span>
    </div>
    <span class="username-badge" id="usernameDisplay"></span>
  </div>

  <div class="main">
    <div class="sidebar">
      <h3>المتصلون</h3>
      <ul id="userList"></ul>
    </div>
    <div class="chat-area">
      <div id="messages"></div>
      <div class="input-area">
        <input id="msgInput" placeholder="اكتب رسالة..." />
        <button class="btn-send" onclick="sendMessage()">إرسال</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const token = localStorage.getItem('token');
    const username = localStorage.getItem('username');
    const room_id = localStorage.getItem('room_id');
    const room_name = localStorage.getItem('room_name');

    if (!token) window.location.href = '/';

    document.getElementById('roomTitle').textContent = room_name;
    document.getElementById('usernameDisplay').textContent = username;

    const socket = io();
    socket.emit('joinRoom', { room_id, username });

    socket.on('messageHistory', (messages) => {
      messages.forEach(msg => addMessage(msg.username, msg.content, msg.username === username));
    });

    socket.on('newMessage', (data) => {
      addMessage(data.username, data.message, data.username === username);
    });

    socket.on('userJoined', (data) => {
      addSystem(data.username + ' انضم للغرفة');
    });

    socket.on('userLeft', (data) => {
      addSystem(data.username + ' غادر الغرفة');
    });

    socket.on('onlineUsers', (users) => {
      const list = document.getElementById('userList');
      list.innerHTML = '';
      users.forEach(u => {
        const li = document.createElement('li');
        li.textContent = u;
        list.appendChild(li);
      });
    });

    function addMessage(user, message, isMe) {
      const div = document.createElement('div');
      div.className = 'msg ' + (isMe ? 'mine' : 'other');
      if (!isMe) {
        const name = document.createElement('div');
        name.className = 'msg-username';
        name.textContent = user;
        div.appendChild(name);
      }
      const text = document.createElement('div');
      text.textContent = message;
      div.appendChild(text);
      document.getElementById('messages').appendChild(div);
      document.getElementById('messages').scrollTop = 999999;
    }

    function addSystem(text) {
      const div = document.createElement('div');
      div.className = 'msg system';
      div.textContent = text;
      document.getElementById('messages').appendChild(div);
    }

    function sendMessage() {
      const message = document.getElementById('msgInput').value;
      if (message.trim()) {
        socket.emit('sendMessage', { room_id, user_id: 1, username, message });
        document.getElementById('msgInput').value = '';
      }
    }

    document.getElementById('msgInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
